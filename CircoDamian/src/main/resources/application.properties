# ─── Aplicación ───────────────────────────────────────────────────
spring.application.name=tarea3adt
spring.main.allow-circular-references=true

# ─── Base de datos MySQL ─────────────────────────────────────────
# createDatabaseIfNotExist=true: la base de datos se crea automáticamente
# la primera vez que se arranca. No hace falta crearla manualmente.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/circo_damianqm?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# ─── JPA / Hibernate ─────────────────────────────────────────────
# ddl-auto=update: Hibernate crea o actualiza las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── Datos iniciales ─────────────────────────────────────────────
# Se ejecuta data.sql DESPUÉS de que Hibernate haya creado las tablas.
# Los INSERT usan INSERT IGNORE, así que si los datos ya existen no se duplican.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ─── Spring Batch (desactivado, no lo usamos) ────────────────────
spring.batch.job.enabled=false
